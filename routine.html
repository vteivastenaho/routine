<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Routine">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<style>
body{
  font-family: Arial;
  background:#f2f6ff;
  text-align:center;
  margin:0;
  color: black; /* default text color */
  transition: background 0.3s, color 0.3s; /* smooth dark/light switch */
}

h1{
  margin-top:20px;
}

.controls{
  margin:15px;
}

button{
  font-size:18px;
  padding:10px 18px;
  margin:5px;
  border-radius:10px;
  border:none;
  background:#5c8df6;
  color:white;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  padding:15px;
}

.card{
  background:white;
  border-radius:15px;
  object-fit:contain;
  padding:10px;
  box-shadow:0 4px 8px rgba(0,0,0,0.2);
  transition:0.3s, background 0.3s, color 0.3s;
  position: relative;
}

.card img{
  width:100%;
  border-radius:10px;
  display:block;
}

.done{
  opacity:0.35;
  transform:scale(0.95);
}

/* Checkmark overlay */
.card .checkmark {
  display: none;
  position: absolute;
  top: 5px;
  right: 5px;
  width: 40px;        /* larger */
  height: 40px;       /* larger */
  font-size: 28px;    /* larger check */
  background-color: green;
  color: white;
  border-radius: 50%;
  font-weight: bold;
  text-align: center;
  line-height: 40px;
}

.card.done .checkmark {
  display: block;
}

/* Dark mode for cards */
body.dark-mode{
  background:#1e1e1e;
  color:white;
}
body.dark-mode .card{
  background:#2b2b2b;
  box-shadow:0 4px 8px rgba(255,255,255,0.1);
}

</style>

</head>

<body>

<h1 id="title">AA-MU</h1>

<div class="controls">
  <button onclick="showMorning()">AA-MU</button>
  <button onclick="showEvening()">IL-TA</button>
  <button onclick="resetCards()">A-LOI-TA</button>
</div>

<div class="grid" id="grid"></div>

<script>
let morning = [
  "images/morning1.JPG",
  "images/morning2.JPG",
  "images/morning3.JPG",
  "images/morning4.JPG",
  "images/morning5.JPG",
  "images/morning6.JPG",
  "images/morning7.JPG",
  "images/morning8.JPG"
];

let evening = [
  "images/evening1.JPG",
  "images/evening2.JPG",
  "images/evening3.JPG",
  "images/evening4.JPG",
  "images/evening5.JPG",
  "images/evening6.JPG",
  "images/evening7.JPG",
  "images/evening8.JPG"
];

let current = morning;

function render(){
  let grid = document.getElementById("grid");
  grid.innerHTML="";

  current.forEach(img =>{
    let card = document.createElement("div");
    card.className="card";

    let image = document.createElement("img");
    image.src = img;
    card.appendChild(image);

    // Add checkmark element
    let check = document.createElement("div");
    check.className = "checkmark";
    check.innerText = "✔";
    card.appendChild(check);

    card.onclick = ()=>{
      card.classList.toggle("done");
    };

    grid.appendChild(card);
  });
}

function showMorning(){
  current = morning;
  document.getElementById("title").innerText="AA-MU";
  document.body.classList.remove("dark-mode"); // light mode
  render();
}

function showEvening(){
  current = evening;
  document.getElementById("title").innerText="IL-TA";
  document.body.classList.add("dark-mode"); // dark mode
  render();
}

function resetCards(){
  render();
}

render();

</script>

</body>
</html>
