<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Routine">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<style>

body{
font-family: Arial;
background:#f2f6ff;
text-align:center;
margin:0;
}

h1{
margin-top:20px;
}

.controls{
margin:15px;
}

button{
font-size:18px;
padding:10px 18px;
margin:5px;
border-radius:10px;
border:none;
background:#5c8df6;
color:white;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:15px;
}

.card{
background:white;
border-radius:15px;
object-fit:contain;
padding:10px;
box-shadow:0 4px 8px rgba(0,0,0,0.2);
transition:0.3s;
}

.card img{
width:100%;
border-radius:10px;
}

.done{
opacity:0.35;
transform:scale(0.95);
}

</style>

</head>

<body>

<h1 id="title">Aamu</h1>

<div class="controls">

<button onclick="showMorning()">Morning</button>
<button onclick="showEvening()">Evening</button>
<button onclick="resetCards()">Reset</button>

</div>

<div class="grid" id="grid"></div>

<script>

let morning = [
"images/morning1.jpg",
"images/morning2.jpg",
"images/morning3.jpg",
"images/morning4.jpg",
"images/morning5.jpg",
"images/morning6.jpg",
"images/morning7.jpg",
"images/morning8.jpg"
];

let evening = [
"images/evening1.jpg",
"images/evening2.jpg",
"images/evening3.jpg",
"images/evening4.jpg",
"images/evening5.jpg",
"images/evening6.jpg",
"images/evening7.jpg",
"images/evening8.jpg"
];

let current = morning;

function render(){

let grid = document.getElementById("grid");
grid.innerHTML="";

current.forEach(img =>{

let card = document.createElement("div");
card.className="card";

let image = document.createElement("img");
image.src=img;

card.appendChild(image);

card.onclick=()=>{
card.classList.toggle("done");
};

grid.appendChild(card);

});

}

function showMorning(){

current = morning;
document.getElementById("title").innerText="Morning Routine";
render();

}

function showEvening(){

current = evening;
document.getElementById("title").innerText="Evening Routine";
render();

}

function resetCards(){

render();

}

render();

</script>

</body>

</html>
